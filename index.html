<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gordon's Quest</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --gold: #FFD700;
            --red: #E63946;
            --blue: #023E8A;
            --sky: #48CAE4;
            --dark: #03071E;
            --accent: #F77F00;
        }

        body {
            background: radial-gradient(ellipse at center, #0a0a2a 0%, #000005 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Press Start 2P', monospace;
        }

        /* Star field */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(1px 1px at 20% 30%, white 0%, transparent 100%),
                radial-gradient(1px 1px at 70% 10%, white 0%, transparent 100%),
                radial-gradient(1px 1px at 45% 80%, rgba(255,255,255,0.6) 0%, transparent 100%),
                radial-gradient(1px 1px at 90% 50%, white 0%, transparent 100%),
                radial-gradient(1px 1px at 10% 60%, rgba(255,255,255,0.4) 0%, transparent 100%),
                radial-gradient(1px 1px at 55% 20%, white 0%, transparent 100%),
                radial-gradient(1px 1px at 35% 70%, rgba(255,255,255,0.7) 0%, transparent 100%),
                radial-gradient(1px 1px at 80% 85%, white 0%, transparent 100%);
            pointer-events: none;
            z-index: 0;
        }

        .screen {
            position: relative;
            width: 800px;
            height: 600px;
            background: #0a0a1e;
            border: 3px solid var(--gold);
            border-radius: 4px;
            overflow: hidden;
            display: none;
            box-shadow:
                0 0 0 1px #000,
                0 0 40px rgba(255, 215, 0, 0.3),
                0 0 80px rgba(255, 215, 0, 0.1),
                inset 0 0 60px rgba(0,0,0,0.5);
            z-index: 1;
        }

        /* Scanline overlay */
        .screen::after {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.08) 2px,
                rgba(0,0,0,0.08) 4px
            );
            pointer-events: none;
            z-index: 100;
        }

        /* ===== MENU SCREEN ===== */
        #menuScreen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .menu-bg {
            position: absolute;
            inset: 0;
            background:
                linear-gradient(to bottom, #0d0d2b 0%, #001a0d 60%, #001500 100%);
        }

        .menu-stars {
            position: absolute;
            inset: 0;
            overflow: hidden;
        }

        .menu-star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite alternate;
        }

        @keyframes twinkle {
            from { opacity: 0.2; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1.2); }
        }

        .menu-ground {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 120px;
            background: linear-gradient(to bottom, #1a5c0a, #0d3306);
            border-top: 4px solid #2d8a12;
        }

        .menu-ground::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 8px;
            background: repeating-linear-gradient(
                90deg,
                #2d8a12 0px, #2d8a12 40px,
                #38b016 40px, #38b016 80px
            );
        }

        /* Pixel castle decoration */
        .menu-castle {
            position: absolute;
            bottom: 120px;
            right: 80px;
            width: 120px;
            height: 100px;
            background: #555;
            border-top: 20px solid transparent;
            box-shadow: inset -10px 0 0 rgba(0,0,0,0.3);
        }

        .menu-title-wrap {
            position: relative;
            z-index: 2;
            text-align: center;
            margin-bottom: 10px;
        }

        .menu-subtitle {
            font-family: 'VT323', monospace;
            font-size: 26px;
            color: var(--sky);
            letter-spacing: 6px;
            margin-bottom: 8px;
            text-shadow: 0 0 10px rgba(72,202,228,0.5);
        }

        .menu-title {
            font-size: 48px;
            color: var(--gold);
            text-shadow:
                4px 4px 0px #8B6914,
                0 0 30px rgba(255,215,0,0.4),
                0 0 60px rgba(255,215,0,0.2);
            letter-spacing: 3px;
            animation: titlePulse 3s ease-in-out infinite;
        }

        @keyframes titlePulse {
            0%, 100% { text-shadow: 4px 4px 0px #8B6914, 0 0 30px rgba(255,215,0,0.4); }
            50% { text-shadow: 4px 4px 0px #8B6914, 0 0 50px rgba(255,215,0,0.7), 0 0 80px rgba(255,215,0,0.3); }
        }

        .menu-btn {
            position: relative;
            z-index: 2;
            background: transparent;
            color: white;
            border: 2px solid var(--gold);
            padding: 14px 40px;
            font-size: 14px;
            font-family: 'Press Start 2P', monospace;
            margin: 10px 0;
            width: 320px;
            border-radius: 2px;
            cursor: pointer;
            transition: all 0.1s;
            text-shadow: 1px 1px 0 #000;
            letter-spacing: 1px;
        }

        .menu-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(255,215,0,0.15), rgba(255,215,0,0.05));
            opacity: 0;
            transition: opacity 0.15s;
        }

        .menu-btn:hover::before { opacity: 1; }

        .menu-btn:hover {
            transform: translateX(4px);
            border-color: white;
            color: var(--gold);
            box-shadow: 0 0 20px rgba(255,215,0,0.3);
        }

        .menu-btn:active { transform: translateX(2px) translateY(2px); }

        .menu-credit {
            position: absolute;
            bottom: 15px;
            color: rgba(255,255,255,0.3);
            font-size: 9px;
            z-index: 2;
            letter-spacing: 1px;
        }

        /* ===== AUTH SCREENS ===== */
        .auth-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #03071E 0%, #08082e 50%, #03071E 100%);
        }

        .auth-title {
            font-size: 28px;
            margin-bottom: 40px;
            color: var(--gold);
            text-shadow: 3px 3px 0 #8B6914, 0 0 20px rgba(255,215,0,0.3);
            text-align: center;
        }

        .pixel-input {
            padding: 14px 20px;
            font-size: 18px;
            font-family: 'VT323', monospace;
            width: 300px;
            text-align: center;
            background: rgba(255,255,255,0.05);
            color: white;
            border: 2px solid rgba(255,215,0,0.4);
            border-radius: 2px;
            margin: 15px 0;
            outline: none;
            letter-spacing: 3px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .pixel-input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 15px rgba(255,215,0,0.2);
        }

        .pixel-input::placeholder { color: rgba(255,255,255,0.2); letter-spacing: 2px; }

        /* ===== LEADERBOARD ===== */
        #leaderboardList {
            width: 88%;
            max-height: 360px;
            overflow-y: auto;
            padding: 10px 20px;
        }

        #leaderboardList::-webkit-scrollbar { width: 4px; }
        #leaderboardList::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
        #leaderboardList::-webkit-scrollbar-thumb { background: var(--gold); }

        .lb-entry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            font-size: 13px;
            color: rgba(255,255,255,0.8);
            font-family: 'VT323', monospace;
            font-size: 20px;
        }

        .lb-rank { color: rgba(255,255,255,0.3); width: 40px; }
        .lb-rank.top1 { color: #FFD700; }
        .lb-rank.top2 { color: #C0C0C0; }
        .lb-rank.top3 { color: #CD7F32; }
        .lb-score { color: var(--gold); }

        /* ===== SETTINGS ===== */
        #settingsPanel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(3, 7, 30, 0.97);
            color: var(--gold);
            padding: 35px;
            border-radius: 2px;
            width: 400px;
            display: none;
            z-index: 50;
            border: 2px solid var(--gold);
            box-shadow: 0 0 40px rgba(255,215,0,0.2);
        }

        .settings-title {
            font-size: 18px;
            margin-bottom: 30px;
            text-align: center;
        }

        .settings-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0;
            font-size: 12px;
            color: rgba(255,255,255,0.7);
        }

        .key-input {
            padding: 10px;
            width: 60px;
            text-align: center;
            background: rgba(255,255,255,0.05);
            color: white;
            border: 2px solid var(--gold);
            border-radius: 2px;
            font-size: 20px;
            font-family: 'VT323', monospace;
            outline: none;
        }

        .close-x {
            position: absolute;
            top: 12px;
            right: 16px;
            background: none;
            color: var(--gold);
            border: 1px solid var(--gold);
            width: 28px;
            height: 28px;
            border-radius: 2px;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Press Start 2P', monospace;
            padding: 0;
            margin: 0;
        }

        .close-x:hover { background: rgba(255,215,0,0.1); }

        /* ===== HUD ===== */
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 30px;
            z-index: 20;
            font-family: 'Press Start 2P', monospace;
        }

        .hud-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hud-label {
            font-size: 7px;
            color: rgba(255,255,255,0.5);
            letter-spacing: 1px;
            margin-bottom: 2px;
        }

        .hud-val {
            font-size: 13px;
            color: white;
            text-shadow: 2px 2px 0 #000;
        }

        .hud-val.gold { color: var(--gold); }
        .hud-val.red { color: #ff4444; }
        .hud-val.green { color: #44ff44; }

        #bossBar {
            position: absolute;
            top: 55px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 20;
            display: none;
            font-family: 'Press Start 2P', monospace;
        }

        .boss-name {
            font-size: 10px;
            color: #ff4444;
            margin-bottom: 5px;
            text-shadow: 1px 1px 0 #000;
        }

        .boss-bar-bg {
            width: 300px;
            height: 14px;
            background: rgba(0,0,0,0.6);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 2px;
            overflow: hidden;
        }

        #bossHealth {
            height: 100%;
            background: linear-gradient(to right, #ff0000, #ff8800);
            transition: width 0.3s;
            border-radius: 1px;
        }

        #powerupBar {
            position: absolute;
            top: 55px;
            left: 20px;
            z-index: 20;
            font-size: 9px;
            font-family: 'Press Start 2P', monospace;
            display: none;
        }

        .fire-bar { color: #ff6600; }
        .rainbow-bar { color: #ff00ff; }

        #flagInfo {
            position: absolute;
            bottom: 55px;
            right: 20px;
            color: rgba(255,255,255,0.5);
            font-size: 9px;
            font-family: 'Press Start 2P', monospace;
            z-index: 20;
        }

        /* ===== MODAL ===== */
        #modal {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 80;
            backdrop-filter: blur(4px);
        }

        .modal-box {
            background: linear-gradient(135deg, #0a0a2a, #12123a);
            border: 2px solid var(--gold);
            border-radius: 4px;
            padding: 50px 60px;
            text-align: center;
            box-shadow: 0 0 60px rgba(255,215,0,0.2);
            font-family: 'Press Start 2P', monospace;
        }

        #modalTitle {
            font-size: 32px;
            color: var(--gold);
            text-shadow: 3px 3px 0 #8B6914;
            margin-bottom: 20px;
        }

        #modalText {
            font-size: 13px;
            color: rgba(255,255,255,0.8);
            line-height: 2.2;
            margin-bottom: 30px;
            white-space: pre-line;
        }

        .modal-btns { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }

        .pixel-btn {
            background: linear-gradient(to bottom, var(--gold), #cc9900);
            color: #000;
            border: none;
            padding: 14px 28px;
            font-size: 11px;
            font-family: 'Press Start 2P', monospace;
            border-radius: 2px;
            cursor: pointer;
            box-shadow: 0 4px 0 #8B6914;
            transition: all 0.1s;
            margin: 0;
        }

        .pixel-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 0 #8B6914; }
        .pixel-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #8B6914; }
        .pixel-btn.blue-btn { background: linear-gradient(to bottom, #00aaff, #0066cc); color: white; box-shadow: 0 4px 0 #004488; }
        .pixel-btn.blue-btn:hover { box-shadow: 0 6px 0 #004488; }
        .pixel-btn.blue-btn:active { box-shadow: 0 2px 0 #004488; }

        #controls {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.25);
            font-size: 7px;
            font-family: 'Press Start 2P', monospace;
            text-align: center;
            z-index: 20;
            letter-spacing: 1px;
        }

        /* Action buttons used in auth screens */
        .action-btn {
            background: transparent;
            color: white;
            border: 2px solid var(--gold);
            padding: 14px 40px;
            font-size: 12px;
            font-family: 'Press Start 2P', monospace;
            margin: 8px 0;
            width: 280px;
            border-radius: 2px;
            cursor: pointer;
            transition: all 0.1s;
        }

        .action-btn:hover {
            background: rgba(255,215,0,0.1);
            color: var(--gold);
        }

        .action-btn.grey { border-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.4); }
        .action-btn.grey:hover { border-color: rgba(255,255,255,0.4); color: rgba(255,255,255,0.7); background: rgba(255,255,255,0.05); }
    </style>
</head>
<body>

<!-- ===== MENU ===== -->
<div id="menuScreen" class="screen" style="display:flex;">
    <div class="menu-bg"></div>
    <div class="menu-stars" id="menuStars"></div>
    <div class="menu-ground"></div>

    <div class="menu-title-wrap">
        <div class="menu-subtitle">SUPER MARIO</div>
        <h1 class="menu-title">GORDON'S QUEST</h1>
    </div>

    <button class="menu-btn" onclick="showLogin()">▶ START GAME</button>
    <button class="menu-btn" onclick="showLeaderboard()">🏆 LEADERBOARD</button>
    <button class="menu-btn" onclick="showSettingsMenu()">⚙ SETTINGS</button>

    <div class="menu-credit">MADE FOR GORDON · FIRE KEY: K</div>

    <div id="settingsPanel">
        <button class="close-x" onclick="hideSettings()">✕</button>
        <div class="settings-title">⚙ SETTINGS</div>
        <div class="settings-row">
            <span>FIRE / FLY KEY</span>
            <input class="key-input" type="text" id="fireKeyInput" value="K" maxlength="1">
        </div>
        <button class="pixel-btn" style="width:100%; margin-top:20px;" onclick="saveSettings()">SAVE & APPLY</button>
    </div>
</div>

<!-- ===== LOGIN ===== -->
<div id="loginScreen" class="screen auth-screen">
    <div class="auth-title">ENTER YOUR NAME</div>
    <input class="pixel-input" type="text" id="playerName" maxlength="12" placeholder="HERO NAME">
    <button class="action-btn" onclick="startGame()" style="margin-top:10px;">⚔ BEGIN QUEST</button>
    <button class="action-btn grey" onclick="showMenu()">← MAIN MENU</button>
</div>

<!-- ===== LEADERBOARD ===== -->
<div id="leaderboardScreen" class="screen auth-screen">
    <div class="auth-title">HALL OF LEGENDS</div>
    <div id="leaderboardList"></div>
    <button class="action-btn grey" onclick="showMenu()" style="margin-top:20px;">← MAIN MENU</button>
</div>

<!-- ===== GAME ===== -->
<div id="gameContainer" class="screen">
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <div id="hud">
        <div class="hud-item">
            <span class="hud-label">LEVEL</span>
            <span class="hud-val" id="levelDisp">1</span>
        </div>
        <div class="hud-item">
            <span class="hud-label">SCORE</span>
            <span class="hud-val gold" id="scoreDisp">0</span>
        </div>
        <div class="hud-item">
            <span class="hud-label">COINS</span>
            <span class="hud-val gold" id="coinsDisp">0</span>
        </div>
        <div class="hud-item">
            <span class="hud-label">LIVES</span>
            <span class="hud-val red" id="livesDisp">3</span>
        </div>
        <div class="hud-item" style="margin-left:auto;">
            <span class="hud-label">POWER</span>
            <span class="hud-val green" id="powerDisp">SMALL</span>
        </div>
    </div>

    <div id="bossBar">
        <div class="boss-name">⚠ BOWSER ⚠</div>
        <div class="boss-bar-bg"><div id="bossHealth" style="width:100%;"></div></div>
    </div>

    <div id="powerupBar"></div>
    <div id="flagInfo">FLAG: X<span id="flagX">0</span> | PLAYER: X<span id="playerX">0</span></div>

    <div id="modal" style="display:none;">
        <div class="modal-box">
            <div id="modalTitle">LEVEL COMPLETE!</div>
            <div id="modalText">Score: 0</div>
            <div class="modal-btns">
                <button class="pixel-btn" id="modalBtn" onclick="handleModalAction()">NEXT</button>
                <button class="pixel-btn blue-btn" id="restartBtn" style="display:none;" onclick="restartFromModal()">↻ RESTART</button>
            </div>
        </div>
    </div>

    <div id="controls">WASD / ARROWS: MOVE &nbsp;|&nbsp; W / ↑ / SPACE: JUMP &nbsp;|&nbsp; K: FIRE / FLY</div>
</div>

<script>
// ============================================================
//  CONFIG
// ============================================================
let currentPlayer = '';
let fireKey = 'K';
const LB_KEY = 'gordons_quest_v2';
let modalActionStr = '';

// Boot leaderboard
if (!localStorage.getItem(LB_KEY)) {
    localStorage.setItem(LB_KEY, JSON.stringify([
        {name:'MARIO',score:8000},{name:'LUIGI',score:7200},{name:'PEACH',score:6500},
        {name:'YOSHI',score:5800},{name:'TOAD',score:5000}
    ]));
}

// Spawn menu stars
document.addEventListener('DOMContentLoaded', () => {
    const wrap = document.getElementById('menuStars');
    for (let i = 0; i < 60; i++) {
        const s = document.createElement('div');
        s.className = 'menu-star';
        const sz = Math.random() * 2 + 1;
        s.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random()*70}%;left:${Math.random()*100}%;animation-delay:${Math.random()*2}s;animation-duration:${1.5+Math.random()*2}s;`;
        wrap.appendChild(s);
    }
});

// ============================================================
//  SCREEN NAV
// ============================================================
function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
    document.getElementById(id).style.display = 'flex';
}

function showMenu() {
    stopGame();
    showScreen('menuScreen');
}

function showLogin() {
    showScreen('loginScreen');
    document.getElementById('playerName').value = '';
    setTimeout(() => document.getElementById('playerName').focus(), 100);
}

function showSettingsMenu() {
    document.getElementById('fireKeyInput').value = fireKey;
    document.getElementById('settingsPanel').style.display = 'block';
}

function hideSettings() {
    document.getElementById('settingsPanel').style.display = 'none';
}

function saveSettings() {
    const k = document.getElementById('fireKeyInput').value.toUpperCase();
    if (k && k.length === 1) {
        fireKey = k;
        hideSettings();
    } else {
        alert('Enter a single key!');
    }
}

function showLeaderboard() {
    const scores = JSON.parse(localStorage.getItem(LB_KEY));
    const container = document.getElementById('leaderboardList');
    container.innerHTML = scores.map((s, i) => {
        const rankClass = i === 0 ? 'top1' : i === 1 ? 'top2' : i === 2 ? 'top3' : '';
        const medals = ['🥇','🥈','🥉'];
        return `<div class="lb-entry">
            <span class="lb-rank ${rankClass}">${medals[i] || `#${i+1}`}</span>
            <span>${s.name || 'ANON'}</span>
            <span class="lb-score">${s.score.toLocaleString()}</span>
        </div>`;
    }).join('');
    showScreen('leaderboardScreen');
}

function startGame() {
    currentPlayer = document.getElementById('playerName').value.trim() || 'Player';
    if (currentPlayer.length < 2) { alert('Name must be at least 2 characters!'); return; }
    showScreen('gameContainer');
    initGame();
}

// ============================================================
//  GAME ENGINE
// ============================================================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const GRAVITY = 0.55;
const JUMP_FORCE = -13.5;
const MOVE_SPEED = 7;

// ---- State ----
let gState = null;    // game-level state
let player = null;
let boss = null;
let platforms = [], coinObjs = [], enemies = [], powerUps = [], fireballs = [], bossFireballs = [];
let keys = {};
let shake = {x:0, y:0, intensity:0, time:0};
let particles = [];
let rainbowInput = '';
const RAINBOW_CODE = 'lord67';
let gameLoopId = null;
let frameCount = 0;

function stopGame() {
    if (gameLoopId) { cancelAnimationFrame(gameLoopId); gameLoopId = null; }
}

// ---- Input ----
document.addEventListener('keydown', e => {
    if (document.getElementById('gameContainer').style.display !== 'flex') return;
    keys[e.code] = true;

    // Rainbow cheat
    rainbowInput += e.key.toLowerCase();
    if (rainbowInput.length > 10) rainbowInput = rainbowInput.slice(-10);
    if (rainbowInput.endsWith(RAINBOW_CODE)) {
        activateRainbow();
        rainbowInput = '';
    }

    if (!player || !gState) return;
    if (gState.over || gState.levelComplete) return;

    // Jump
    if ((e.code === 'Space' || e.code === 'KeyW' || e.code === 'ArrowUp') && player.grounded) {
        player.velY = JUMP_FORCE;
        player.grounded = false;
        screenShake(3, 8);
        spawnParticles(player.x+16, player.y+player.h, 4, {color:'rgba(255,255,255,0.4)', size:2, life:12});
    }

    // Fire / fly
    if (e.key.toUpperCase() === fireKey) {
        // Fire flower shot
        if (player.powerUp === 'fire') shootFireball();

        // Rainbow fly burst
        if (player.isRainbow) {
            player.velY = -12;
            player.flightUsed = true;
            spawnParticles(player.x+16, player.y+player.h, 12, {color:'#00ffff', size:3, life:20});
            screenShake(4, 8);
        }

        // Boss hit
        if (boss && boss.active) {
            boss.health--;
            spawnParticles(boss.x + 32, boss.y + 32, 20, {color:'#ff4444', size:4, life:30});
            screenShake(10, 18);
            updateBossBar();
            if (boss.health <= 0) {
                boss.active = false;
                gState.score += 5000;
                updateHUD();
                setTimeout(() => completeLevel(), 600);
            }
        }
    }
});

function loadLevel(num) {

    if (!lvl) {
        showModal('🏆 QUEST COMPLETE!', `You saved the kingdom!\nFinal Score: ${gState.score.toLocaleString()}`, 'MAIN MENU', 'menu');

    }

    coinObjs  = lvl.coins   ? lvl.coins.map(c => ({...c, collected:false})) : [];
    enemies   = lvl.enemies ? lvl.enemies.map(e => ({...e, active:true, dir:1, speed: e.type==='KOOPA'?1.2:1.5, vy:0})) : [];
    powerUps  = lvl.powerUps? lvl.powerUps.map(p => ({...p, collected:false})) : [];

    bossFireballs = [];

}

        100
    );
}

// ============================================================
//  UPDATE LOGIC
// ============================================================
function updatePlayer() {
    if (gState.over || gState.levelComplete) return;

    // Movement
    player.velX = 0;
    if (keys['ArrowLeft'] || keys['KeyA']) { player.velX = -MOVE_SPEED; player.facing = -1; }
    else if (keys['ArrowRight'] || keys['KeyD']) { player.velX = MOVE_SPEED; player.facing = 1; }

    // Walk animation
    if (player.velX !== 0) {
        player.walkTimer++;
        if (player.walkTimer > 8) { player.walkTimer = 0; player.walkFrame = (player.walkFrame + 1) % 4; }
    } else {
        player.walkFrame = 0;
    }

    // Gravity
    player.velY += GRAVITY;

    // Apply
    player.x += player.velX;
    player.y += player.velY;

    // Player height from power
    player.h = (player.powerUp === 'big' || player.powerUp === 'fire') ? 48 : 32;

    // Platform collision
    player.grounded = false;
    for (const p of platforms) {
        if (player.x + player.w > p.x && player.x < p.x + p.w) {
            const bottom = player.y + player.h;
            if (bottom >= p.y && bottom <= p.y + 30 && player.velY >= 0) {
                player.y = p.y - player.h;
                player.velY = 0;
                player.grounded = true;
            }
        }
    }

    // Floor / pit
    if (player.y > 660) loseLife();

    // Invincibility countdown
    if (player.invincible) {
        player.invincibleTimer--;
        if (player.invincibleTimer <= 0) {
            player.invincible = false;
            player.invincibleTimer = 0;
        }
    }

    // Fire timer
    if (player.powerUp === 'fire') {
        player.fireTimer--;
        if (player.fireTimer <= 0) {
            player.powerUp = 'big';
            player.fireTimer = 0;
        }
    }

    // Rainbow timer
    if (player.isRainbow) {
        player.rainbowTimer--;
        if (player.rainbowTimer <= 0) {
            player.isRainbow = false;
            player.rainbowTimer = 0;
        }
    }

    // Fire cooldown
    if (player.fireCooldown > 0) player.fireCooldown--;

    // Camera
    gState.cameraX = Math.max(0, player.x - 350);
    document.getElementById('playerX').textContent = Math.floor(player.x);
}

function updateEnemies() {
    for (const e of enemies) {
        if (!e.active) continue;

        // Move
        e.x += e.speed * e.dir;
        e.vy += GRAVITY * 0.8;
        e.y += e.vy;

        // Platform
        let landed = false;
        for (const p of platforms) {
            if (e.x + 32 > p.x && e.x < p.x + p.w) {
                const bot = e.y + 32;
                if (bot >= p.y && bot <= p.y + 25 && e.vy >= 0) {
                    e.y = p.y - 32;
                    e.vy = 0;
                    landed = true;
                    if (e.x <= p.x || e.x + 32 >= p.x + p.w) e.dir *= -1;
                }
            }
        }
        if (!landed && e.y > 620) { e.active = false; continue; }

        // Player collision
        if (!player.invincible &&
            player.x + player.w > e.x + 4 && player.x < e.x + 28 &&
            player.y + player.h > e.y + 4 && player.y < e.y + 28)
        {
            if (player.velY > 1 && player.y + player.h < e.y + 16) {
                // Stomp
                e.active = false;
                player.velY = -9;
                gState.score += 200;
                updateHUD();
                screenShake(4, 10);
                spawnParticles(e.x+16, e.y, 10, {color:'#aaa', size:2, life:20});
            } else if (!player.isRainbow) {
                hitPlayer();
            } else {
                // Rainbow kills enemy
                e.active = false;
                gState.score += 200;
                updateHUD();
                spawnParticles(e.x+16, e.y, 12, {color:'#ff00ff', size:3, life:25});
            }
        }
    }
}

function updateBoss() {
    if (!boss || !boss.active) return;
    // Boss paces
    boss.x += (Math.sin(frameCount * 0.02) * 1.5);
    boss.fireCooldown--;
    if (boss.fireCooldown <= 0) {
        bossFireballs.push({x:boss.x, y:boss.y+40, vx:-5, vy:0, r:10});
        boss.fireCooldown = 110;
        screenShake(5, 8);
    }
    updateBossBar();
}

function updateBossBar() {
    document.getElementById('bossHealth').style.width = `${(boss.health/boss.maxHealth)*100}%`;
}

function updateFireballs() {
    fireballs = fireballs.filter(f => {
        f.x += f.vx;
        f.y += f.vy;
        f.vy += 0.25;
        // Bounce off ground-ish
        if (f.y > 540) { f.y = 540; f.vy = -Math.abs(f.vy) * 0.6; }
        // Enemy hit
        for (const e of enemies) {
            if (e.active && f.x > e.x && f.x < e.x+32 && f.y > e.y && f.y < e.y+32) {
                e.active = false;
                gState.score += 200;
                updateHUD();
                spawnParticles(e.x+16, e.y+16, 12, {color:'#ff6600', size:3, life:25});
                return false;
            }
        }
        return f.y < 620 && f.x > -200 && f.x < 3000;
    });

    bossFireballs = bossFireballs.filter(f => {
        f.x += f.vx;
        f.y += f.vy;
        if (!player.invincible && !player.isRainbow &&
            Math.abs(f.x - (player.x+16)) < 20 && Math.abs(f.y - (player.y+player.h/2)) < 20)
        {
            hitPlayer();
            return false;
        }
        return f.y < 620 && f.x > -200;
    });
}

function updateCoins() {
    for (const c of coinObjs) {
        if (c.collected) continue;
        if (Math.abs(player.x+16 - c.x) < 22 && Math.abs(player.y+player.h/2 - c.y) < 22) {
            c.collected = true;
            gState.coins++;
            gState.score += 100;
            updateHUD();
            spawnParticles(c.x, c.y, 8, {color:'#FFD700', size:2, life:25});
        }
    }
}

function updatePowerUps() {
    for (const p of powerUps) {
        if (p.collected) continue;
        if (Math.abs(player.x+16 - p.x) < 28 && Math.abs(player.y+player.h/2 - p.y) < 28) {
            p.collected = true;
            if (p.type === 'mushroom') {
                if (player.powerUp === 'small') { player.powerUp = 'big'; player.y -= 16; }
                gState.score += 500;
            } else if (p.type === 'fireFlower') {
                const wasSmall = player.powerUp === 'small';
                player.powerUp = 'fire';
                player.fireTimer = 900; // 15s at 60fps
                if (wasSmall) player.y -= 16;
                gState.score += 1000;
            }
            updateHUD();
            spawnParticles(p.x, p.y, 20, {color: p.type==='fireFlower'?'#ff6600':'#ff2222', size:4, life:35});
        }
    }
}

function checkFlag() {
    const lvl = levels[gState.currentLevel - 1];
    if (!lvl || !lvl.flag) return;
    if (boss && boss.active) return;
    const f = lvl.flag;
    if (player.x + player.w > f.x && player.x < f.x + 12) {
        completeLevel();
    }
}

function hitPlayer() {
    if (player.invincible || player.isRainbow) return;
    if (player.powerUp === 'fire') {
        player.powerUp = 'big';
        player.fireTimer = 0;
    } else if (player.powerUp === 'big') {
        player.powerUp = 'small';
        player.h = 32;
        player.y += 16;
    } else {
        loseLife(); return;
    }
    player.invincible = true;
    player.invincibleTimer = 120;
    screenShake(8, 15);
    updateHUD();
}

function loseLife() {
    if (gState.over) return;
    gState.lives--;
    updateHUD();
    screenShake(12, 20);
    spawnParticles(player.x+16, player.y+16, 30, {color:'#ff4444', size:4, life:40});

    if (gState.lives <= 0) {
        gState.over = true;
        saveScore();
        setTimeout(() => {
            showModal('GAME OVER', `Final Score:\n${gState.score.toLocaleString()}`, 'MAIN MENU', 'menu', true);
        }, 600);
    } else {
        // Respawn
        player.x = 100;
        player.y = 380;
        player.velX = 0;
        player.velY = 0;
        player.invincible = true;
        player.invincibleTimer = 150;
    }
}

function shootFireball() {
    if (player.fireCooldown > 0) return;
    player.fireCooldown = 30;
    const startX = player.facing > 0 ? player.x + player.w + 2 : player.x - 10;
    fireballs.push({x:startX, y:player.y + player.h*0.5, vx:player.facing * 9, vy:-2, r:8});
    spawnParticles(startX, player.y+player.h*0.5, 6, {color:'#ff6600', size:2, life:15});
}

function completeLevel() {
    if (gState.levelComplete) return;
    gState.levelComplete = true;
    gState.score += 1000;
    gState.currentLevel++;
    updateHUD();

    if (gState.currentLevel > levels.length) {
        saveScore();
        setTimeout(() => showModal('🏆 QUEST COMPLETE!', `You saved the kingdom!\nFinal Score: ${gState.score.toLocaleString()}`, 'MAIN MENU', 'menu'), 400);
    } else {
        setTimeout(() => showModal('🌟 LEVEL COMPLETE!', `Score: ${gState.score.toLocaleString()}`, 'NEXT LEVEL', 'next'), 400);
    }
}

function nextLevel() {
    loadLevel(gState.currentLevel);
}

function updateHUD() {
    document.getElementById('levelDisp').textContent = gState.currentLevel;
    document.getElementById('scoreDisp').textContent = gState.score.toLocaleString();
    document.getElementById('coinsDisp').textContent = gState.coins;
    document.getElementById('livesDisp').textContent = gState.lives;
    document.getElementById('powerDisp').textContent =
        player.powerUp === 'fire' ? 'FIRE' : player.powerUp === 'big' ? 'BIG' : 'SMALL';

    // Power-up bar
    const pb = document.getElementById('powerupBar');
    let lines = [];
    if (player.powerUp === 'fire' && player.fireTimer > 0) {
        lines.push(`<span class="fire-bar">🔥 FIRE: ${Math.ceil(player.fireTimer/60)}s</span>`);
    }
    if (player.isRainbow) {
        lines.push(`<span class="rainbow-bar">🌈 AURA: ${Math.ceil(player.rainbowTimer/60)}s</span>`);
    }
    pb.innerHTML = lines.join('<br>');
    pb.style.display = lines.length ? 'block' : 'none';
}

// ============================================================
//  PARTICLES
// ============================================================
function spawnParticles(x, y, count, opts = {}) {
    const {color='#fff', size=2, life=20} = opts;
    for (let i = 0; i < count; i++) {
        particles.push({
            x, y,
            vx: (Math.random()-0.5)*7,
            vy: (Math.random()-0.5)*7 - 1,
            r: size + Math.random()*size,
            life, maxLife: life,
            color
        });
    }
}

function updateParticles() {
    particles = particles.filter(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.15;
        p.life--;
        p.r *= 0.97;
        return p.life > 0;
    });
}

function screenShake(intensity=5, duration=10) {
    shake.intensity = intensity;
    shake.time = duration;
}

function updateShake() {
    if (shake.time > 0) {
        shake.x = (Math.random()-0.5) * shake.intensity;
        shake.y = (Math.random()-0.5) * shake.intensity;
        shake.time--;
    } else { shake.x = 0; shake.y = 0; }
}

// ============================================================
//  DRAWING
// ============================================================
const cloudOffsets = [{x:200,y:80,s:1},{x:500,y:50,s:0.8},{x:1100,y:90,s:1.1},{x:1600,y:60,s:0.9},{x:2100,y:80,s:1}];

function drawBackground() {
    const cx = gState.cameraX;
    const sx = shake.x, sy = shake.y;

    // Sky gradient
    const skyGrad = ctx.createLinearGradient(0,0,0,380);
    skyGrad.addColorStop(0,'#1a87d8');
    skyGrad.addColorStop(1,'#6ccbf8');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, 800, 400);

    // Sun
    const sunX = 700 - cx*0.05 + sx;
    ctx.fillStyle = '#fff9c4';
    ctx.shadowColor = '#ffe082';
    ctx.shadowBlur = 30;
    ctx.beginPath();
    ctx.arc(sunX, 70+sy, 35, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Clouds (parallax)
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    for (const c of cloudOffsets) {
        const cx2 = (c.x - cx * 0.3) % 900;
        drawCloud((cx2 + sx) % 900, c.y + sy, c.s);
    }

    // Far mountains
    ctx.fillStyle = '#5b8fb9';
    for (let i = 0; i < 6; i++) {
        const mx = (i * 280 - cx * 0.15 + sx + 800) % 1400 - 200;
        const mh = 80 + Math.sin(i * 2.3) * 40;
        ctx.beginPath();
        ctx.moveTo(mx, 400);
        ctx.lineTo(mx + 140, 400 - mh);
        ctx.lineTo(mx + 280, 400);
        ctx.fill();
    }

    // Ground gradient
    const groundGrad = ctx.createLinearGradient(0, 400, 0, 600);
    groundGrad.addColorStop(0,'#3a7d44');
    groundGrad.addColorStop(0.15,'#2d6a3a');
    groundGrad.addColorStop(0.15,'#5c3d1e');
    groundGrad.addColorStop(1,'#3b2310');
    ctx.fillStyle = groundGrad;
    ctx.fillRect(0, 400, 800, 200);

    // Ground tile pattern
    ctx.fillStyle = 'rgba(0,0,0,0.08)';
    for (let i = 0; i < 16; i++) {
        const gx = ((i * 50) - (cx * 1) % 50 + sx) % 850 - 50;
        ctx.fillRect(gx, 400, 1, 200);
    }
}

function drawCloud(x, y, scale) {
    const s = scale;
    ctx.beginPath();
    ctx.arc(x, y, 25*s, 0, Math.PI*2);
    ctx.arc(x+30*s, y-10*s, 30*s, 0, Math.PI*2);
    ctx.arc(x+60*s, y, 22*s, 0, Math.PI*2);
    ctx.arc(x+30*s, y+10*s, 25*s, 0, Math.PI*2);
    ctx.fill();
}

function drawPlatforms() {
    for (const p of platforms) {
        const rx = p.x - gState.cameraX + shake.x;
        const ry = p.y + shake.y;
        if (rx > 900 || rx + p.w < -10) continue;

        const isGround = p.h >= 40;

        if (isGround) {
            // Ground block
            const grad = ctx.createLinearGradient(rx, ry, rx, ry+p.h);
            grad.addColorStop(0,'#4caf50');
            grad.addColorStop(0.2,'#388e3c');
            grad.addColorStop(0.2,'#5d4037');
            grad.addColorStop(1,'#3e2723');
            ctx.fillStyle = grad;
            ctx.fillRect(rx, ry, p.w, p.h);
            // Top row tiles
            ctx.fillStyle = '#66bb6a';
            for (let tx = 0; tx < p.w; tx += 16) {
                ctx.fillRect(rx+tx, ry, Math.min(16, p.w-tx), 4);
            }
            // Brick lines
            ctx.strokeStyle = 'rgba(0,0,0,0.2)';
            ctx.lineWidth = 1;
            for (let ty = 0; ty < p.h; ty += 16) {
                ctx.beginPath(); ctx.moveTo(rx, ry+ty); ctx.lineTo(rx+p.w, ry+ty); ctx.stroke();
            }
        } else {
            // Floating platform — pixel brick style
            const grad = ctx.createLinearGradient(rx, ry, rx, ry+p.h);
            grad.addColorStop(0,'#b87333');
            grad.addColorStop(0.5,'#a0522d');
            grad.addColorStop(1,'#8B4513');
            ctx.fillStyle = grad;
            ctx.fillRect(rx, ry, p.w, p.h);
            // Highlight top
            ctx.fillStyle = '#d4a15a';
            ctx.fillRect(rx, ry, p.w, 4);
            // Shadow bottom
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.fillRect(rx, ry+p.h-4, p.w, 4);
            // Brick grid
            ctx.strokeStyle = 'rgba(0,0,0,0.25)';
            ctx.lineWidth = 1;
            for (let ty = 0; ty < p.h; ty += p.h) {
                ctx.beginPath(); ctx.moveTo(rx, ry+ty); ctx.lineTo(rx+p.w, ry+ty); ctx.stroke();
            }
            for (let tx = 0; tx < p.w; tx += 24) {
                ctx.beginPath(); ctx.moveTo(rx+tx, ry); ctx.lineTo(rx+tx, ry+p.h); ctx.stroke();
            }
        }
    }
}

function drawPlayer() {
    const rx = player.x - gState.cameraX + shake.x;
    const ry = player.y + shake.y;
    const h = player.h;
    const fl = player.facing;

    // Blink when invincible
    if (player.invincible && Math.floor(frameCount / 4) % 2 === 0) return;

    ctx.save();
    if (fl < 0) {
        ctx.scale(-1, 1);
        ctx.translate(-rx*2 - player.w, 0);
    }

    if (player.isRainbow) {
        // Pulsing rainbow outline
        const t = frameCount * 0.05;
        const hue = (t * 60) % 360;
        ctx.shadowColor = `hsl(${hue},100%,60%)`;
        ctx.shadowBlur = 18;
        // Body
        ctx.fillStyle = `hsl(${hue},80%,60%)`;
        ctx.fillRect(rx+4, ry, 24, h);
        ctx.fillStyle = '#ffe0b2';
        ctx.fillRect(rx+8, ry+h*0.45, 16, 10); // face
        ctx.fillStyle = `hsl(${(hue+180)%360},80%,60%)`;
        ctx.fillRect(rx, ry, 32, h*0.3); // hat
        ctx.shadowBlur = 0;
        // Flying aura ring
        const pulse = 1 + Math.sin(frameCount*0.15)*0.3;
        ctx.strokeStyle = `hsl(${hue},100%,70%)`;
        ctx.lineWidth = 3;
        ctx.globalAlpha = 0.6;
        ctx.beginPath();
        ctx.ellipse(rx+16, ry+h/2, 24*pulse, 16*pulse, 0, 0, Math.PI*2);
        ctx.stroke();
        ctx.globalAlpha = 1;
    } else {
        const isFire = player.powerUp === 'fire';
        const isBig = player.powerUp === 'big' || isFire;
        const hatColor = isFire ? '#ffffff' : '#e53935';
        const shirtColor = isFire ? '#ffffff' : '#1565c0';
        const skinColor = '#ffe0b2';
        const overallColor = isFire ? '#e0e0e0' : '#1976d2';

        // Hat
        ctx.fillStyle = hatColor;
        ctx.fillRect(rx+2, ry, 28, isBig?10:8);
        ctx.fillRect(rx, ry+(isBig?10:8), 32, isBig?6:5);

        // Head (skin)
        ctx.fillStyle = skinColor;
        const headY = ry + (isBig?16:13);
        const headH = isBig?12:10;
        ctx.fillRect(rx+6, headY, 20, headH);

        // Eye
        ctx.fillStyle = '#000';
        ctx.fillRect(rx + (fl > 0 ? 20 : 6), headY+3, 3, 4);
        // Mustache
        ctx.fillStyle = '#4e342e';
        ctx.fillRect(rx+8, headY+8, 16, 3);

        // Body
        const bodyY = headY + headH;
        const bodyH = h - (bodyY - ry);
        ctx.fillStyle = overallColor;
        ctx.fillRect(rx+4, bodyY, 24, bodyH*0.6);
        ctx.fillStyle = shirtColor;
        ctx.fillRect(rx+4, bodyY + bodyH*0.6, 24, bodyH*0.4);

        // Shoes
        ctx.fillStyle = '#3e2723';
        const walkOff = [0,-2,-1,0][player.walkFrame] || 0;
        ctx.fillRect(rx+2, ry+h-6 + (player.grounded?0:0), 12, 6);
        ctx.fillRect(rx+18, ry+h-6, 12, 6);
    }

    ctx.restore();
}

function drawCoins() {
    for (const c of coinObjs) {
        if (c.collected) continue;
        const rx = c.x - gState.cameraX + shake.x;
        const ry = c.y + shake.y;
        if (rx < -20 || rx > 820) continue;

        // Animated spin
        const scaleX = Math.abs(Math.cos(frameCount * 0.08 + c.x * 0.01));
        ctx.save();
        ctx.translate(rx, ry);

        const coinGrad = ctx.createRadialGradient(-3,-3,2, 0,0,11);
        coinGrad.addColorStop(0,'#fff176');
        coinGrad.addColorStop(0.4,'#fdd835');
        coinGrad.addColorStop(1,'#f9a825');
        ctx.fillStyle = coinGrad;
        ctx.shadowColor = '#ffd700';
        ctx.shadowBlur = 8;
        ctx.scale(scaleX, 1);
        ctx.beginPath();
        ctx.arc(0, 0, 10, 0, Math.PI*2);
        ctx.fill();
        ctx.shadowBlur = 0;

        if (scaleX > 0.5) {
            ctx.fillStyle = 'rgba(255,255,255,0.5)';
            ctx.beginPath();
            ctx.arc(-3, -3, 4, 0, Math.PI*2);
            ctx.fill();
        }
        ctx.restore();
    }
}

function drawEnemies() {
    for (const e of enemies) {
        if (!e.active) continue;
        const rx = e.x - gState.cameraX + shake.x;
        const ry = e.y + shake.y;
        if (rx < -50 || rx > 860) continue;

        const fl = e.dir;

        if (e.type === 'GOOMBA') {
            // Body — brown mushroom shape
            const grad = ctx.createRadialGradient(rx+16, ry+16, 4, rx+16, ry+20, 20);
            grad.addColorStop(0,'#a0522d');
            grad.addColorStop(1,'#6d3016');
            ctx.fillStyle = grad;
            // Head (oval)
            ctx.beginPath();
            ctx.ellipse(rx+16, ry+14, 16, 14, 0, 0, Math.PI*2);
            ctx.fill();
            // Feet
            ctx.fillStyle = '#3e1a0a';
            const walkOff = Math.sin(frameCount*0.2)*3;
            ctx.beginPath(); ctx.ellipse(rx+8, ry+29+walkOff, 8, 5, 0, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(rx+24, ry+29-walkOff, 8, 5, 0, 0, Math.PI*2); ctx.fill();
            // Eyes
            ctx.fillStyle = '#fff';
            ctx.fillRect(rx+6, ry+9, 8, 6);
            ctx.fillRect(rx+18, ry+9, 8, 6);
            ctx.fillStyle = '#000';
            ctx.fillRect(rx+(fl>0?12:8), ry+10, 4, 4);
            ctx.fillRect(rx+(fl>0?24:20), ry+10, 4, 4);
            // Angry brows
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(rx+5, ry+8); ctx.lineTo(rx+14, ry+10); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(rx+18, ry+10); ctx.lineTo(rx+27, ry+8); ctx.stroke();
        } else {
            // KOOPA — green shell turtle
            ctx.fillStyle = '#2e7d32';
            ctx.beginPath();
            ctx.ellipse(rx+16, ry+18, 15, 16, 0, 0, Math.PI*2);
            ctx.fill();
            // Shell pattern
            ctx.strokeStyle = '#1b5e20';
            ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.moveTo(rx+8, ry+10); ctx.lineTo(rx+24, ry+26); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(rx+24, ry+10); ctx.lineTo(rx+8, ry+26); ctx.stroke();
            // Head
            ctx.fillStyle = '#c8e6c9';
            ctx.beginPath();
            ctx.ellipse(rx+(fl>0?25:7), ry+8, 9, 8, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(rx+(fl>0?27:9), ry+6, 2.5, 0, Math.PI*2);
            ctx.fill();
            // Feet
            ctx.fillStyle = '#f9a825';
            const walkOff = Math.sin(frameCount*0.2)*3;
            ctx.beginPath(); ctx.ellipse(rx+8, ry+33+walkOff, 7, 4, 0, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(rx+24, ry+33-walkOff, 7, 4, 0, 0, Math.PI*2); ctx.fill();
        }
    }
}

function drawPowerUps() {
    for (const p of powerUps) {
        if (p.collected) continue;
        const rx = p.x - gState.cameraX + shake.x;
        const ry = p.y + shake.y + Math.sin(frameCount*0.07+p.x)*3;
        if (rx < -30 || rx > 830) continue;

        if (p.type === 'mushroom') {
            // Cap
            const capGrad = ctx.createRadialGradient(rx-4, ry-10, 3, rx, ry-6, 14);
            capGrad.addColorStop(0,'#ef9a9a');
            capGrad.addColorStop(1,'#c62828');
            ctx.fillStyle = capGrad;
            ctx.beginPath();
            ctx.arc(rx, ry-6, 14, Math.PI, 0);
            ctx.fill();
            // White dots
            ctx.fillStyle = '#fff';
            ctx.beginPath(); ctx.arc(rx-5, ry-10, 3, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(rx+5, ry-10, 3, 0, Math.PI*2); ctx.fill();
            // Stem
            ctx.fillStyle = '#ffe0b2';
            ctx.fillRect(rx-7, ry-2, 14, 10);
            // Eyes
            ctx.fillStyle = '#000';
            ctx.fillRect(rx-5, ry+1, 3, 3);
            ctx.fillRect(rx+2, ry+1, 3, 3);
        } else {
            // Fire flower
            ctx.fillStyle = '#388e3c';
            ctx.fillRect(rx-2, ry-10, 4, 14);
            const flHue = (frameCount*2) % 360;
            ctx.fillStyle = `hsl(${flHue},100%,55%)`;
            ctx.shadowColor = `hsl(${flHue},100%,60%)`;
            ctx.shadowBlur = 10;
            for (let i = 0; i < 5; i++) {
                const angle = (i/5)*Math.PI*2 + frameCount*0.05;
                ctx.beginPath();
                ctx.arc(rx + Math.cos(angle)*8, ry-14 + Math.sin(angle)*8, 5, 0, Math.PI*2);
                ctx.fill();
            }
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#fff9c4';
            ctx.beginPath(); ctx.arc(rx, ry-14, 5, 0, Math.PI*2); ctx.fill();
        }
    }
}

function drawFireballs() {
    for (const f of fireballs) {
        const rx = f.x - gState.cameraX + shake.x;
        const ry = f.y + shake.y;
        ctx.shadowColor = '#ff6600';
        ctx.shadowBlur = 12;
        ctx.fillStyle = '#ff9800';
        ctx.beginPath(); ctx.arc(rx, ry, f.r, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#fff176';
        ctx.beginPath(); ctx.arc(rx, ry, f.r*0.45, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0;
    }
    for (const f of bossFireballs) {
        const rx = f.x - gState.cameraX + shake.x;
        const ry = f.y + shake.y;
        ctx.shadowColor = '#ff0000';
        ctx.shadowBlur = 15;
        ctx.fillStyle = '#ff1744';
        ctx.beginPath(); ctx.arc(rx, ry, f.r, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#ff8a80';
        ctx.beginPath(); ctx.arc(rx, ry, f.r*0.4, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0;
    }
}

function drawBoss() {
    if (!boss || !boss.active) return;
    const rx = boss.x - gState.cameraX + shake.x;
    const ry = boss.y + shake.y;

    // Spiky shell
    ctx.fillStyle = '#b71c1c';
    ctx.beginPath(); ctx.arc(rx+40, ry+40, 36, 0, Math.PI*2); ctx.fill();

    // Shell scales
    ctx.strokeStyle = '#d32f2f';
    ctx.lineWidth = 2;
    for (let i = 0; i < 6; i++) {
        const a = (i/6)*Math.PI*2;
        ctx.beginPath();
        ctx.arc(rx+40 + Math.cos(a)*18, ry+40 + Math.sin(a)*18, 10, 0, Math.PI*2);
        ctx.stroke();
    }

    // Spikes
    ctx.fillStyle = '#4a0000';
    for (let i = 0; i < 8; i++) {
        const a = (i/8)*Math.PI*2 + frameCount*0.01;
        ctx.save();
        ctx.translate(rx+40 + Math.cos(a)*36, ry+40 + Math.sin(a)*36);
        ctx.rotate(a);
        ctx.beginPath();
        ctx.moveTo(0,-8); ctx.lineTo(-5,0); ctx.lineTo(5,0);
        ctx.closePath(); ctx.fill();
        ctx.restore();
    }

    // Face
    ctx.fillStyle = '#ffcc80';
    ctx.beginPath(); ctx.ellipse(rx+40, ry+36, 22, 18, 0, 0, Math.PI*2); ctx.fill();

    // Eyes
    const eyeR = 1 + Math.sin(frameCount*0.1)*0.5;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(rx+30, ry+30, 8, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(rx+50, ry+30, 8, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#f00';
    ctx.beginPath(); ctx.arc(rx+32, ry+30, 5*eyeR, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(rx+52, ry+30, 5*eyeR, 0, Math.PI*2); ctx.fill();

    // Mouth / fangs
    ctx.fillStyle = '#b71c1c';
    ctx.beginPath();
    ctx.moveTo(rx+25, ry+46); ctx.quadraticCurveTo(rx+40, ry+58, rx+55, ry+46);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.fillRect(rx+28, ry+46, 7, 10);
    ctx.fillRect(rx+45, ry+46, 7, 10);

    // HP glow
    const hpFrac = boss.health / boss.maxHealth;
    ctx.shadowColor = hpFrac > 0.5 ? '#ff8800' : '#ff0000';
    ctx.shadowBlur = 20 + Math.sin(frameCount*0.1)*10;
    ctx.strokeStyle = ctx.shadowColor;
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(rx+40, ry+40, 40, 0, Math.PI*2); ctx.stroke();
    ctx.shadowBlur = 0;
}

function drawFlag() {
    const lvl = levels[gState.currentLevel - 1];
    if (!lvl || !lvl.flag) return;
    const f = lvl.flag;
    const rx = f.x - gState.cameraX + shake.x;
    const ry = f.y + shake.y;
    if (rx < -60 || rx > 860) return;

    // Pole
    ctx.fillStyle = '#9e9e9e';
    ctx.fillRect(rx-2, ry-110, 6, 110);
    // Flag
    ctx.fillStyle = '#ef5350';
    ctx.beginPath();
    ctx.moveTo(rx+4, ry-110);
    ctx.lineTo(rx+44, ry-96);
    ctx.lineTo(rx+4, ry-82);
    ctx.closePath();
    ctx.fill();
    // Star on flag
    ctx.fillStyle = '#fff';
    ctx.font = '14px serif';
    ctx.fillText('★', rx+10, ry-92);
    // Label
    ctx.font = 'bold 9px "Press Start 2P"';
    ctx.fillStyle = '#fff9';
    ctx.textAlign = 'center';
    ctx.fillText('GOAL', rx+2, ry-118);
    ctx.textAlign = 'left';
}

function drawParticles() {
    for (const p of particles) {
        const alpha = p.life / p.maxLife;
        ctx.globalAlpha = alpha * 0.9;
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color;
        ctx.shadowBlur = 4;
        ctx.beginPath();
        ctx.arc(p.x - gState.cameraX + shake.x, p.y + shake.y, p.r, 0, Math.PI*2);
        ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
}

// ============================================================
//  GAME LOOP
// ============================================================
function gameLoop() {
    if (!gState) return;
    frameCount++;

    updateShake();
    if (!gState.over && !gState.levelComplete) {
        updatePlayer();
        updateEnemies();
        updateCoins();
        updatePowerUps();
        updateFireballs();
        if (boss && boss.active) updateBoss();
        checkFlag();
        updateParticles();
        if (frameCount % 30 === 0) updateHUD(); // periodic HUD sync
    } else {
        updateParticles();
    }

    // Draw
    drawBackground();
    drawPlatforms();
    drawCoins();
    drawPowerUps();
    drawEnemies();
    drawFireballs();
    if (boss && boss.active) drawBoss();
    drawFlag();
    drawPlayer();
    drawParticles();

    gameLoopId = requestAnimationFrame(gameLoop);
}

// ============================================================
//  MODAL
// ============================================================
function showModal(title, text, btnLabel, action, showRestart=false) {
    document.getElementById('modalTitle').textContent = title;
    document.getElementById('modalText').textContent = text;
    document.getElementById('modalBtn').textContent = btnLabel;
    modalActionStr = action;
    const rb = document.getElementById('restartBtn');
    rb.style.display = showRestart ? 'inline-block' : 'none';
    document.getElementById('modal').style.display = 'flex';
}

function handleModalAction() {
    document.getElementById('modal').style.display = 'none';
    if (modalActionStr === 'menu') { showMenu(); }
    else if (modalActionStr === 'next') { nextLevel(); }
    else if (modalActionStr === 'restart') { initGame(); }
    else if (modalActionStr === 'close') { /* just close */ }
}

function restartFromModal() {
    document.getElementById('modal').style.display = 'none';
    initGame();
}

// ============================================================
//  SAVE SCORE
// ============================================================
function saveScore() {
    try {
        const scores = JSON.parse(localStorage.getItem(LB_KEY));
        const name = currentPlayer || 'ANON';
        const filtered = scores.filter(s => s.name !== name);
        filtered.push({name, score: gState.score});
        filtered.sort((a,b) => b.score - a.score);
        localStorage.setItem(LB_KEY, JSON.stringify(filtered.slice(0,10)));
    } catch(e) {}
}
