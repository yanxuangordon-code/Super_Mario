<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Mario: Gordon's Quest</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', monospace;
        }
        body {
            background: linear-gradient(to bottom, #000428, #004e92);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            color: white;
        }

        .screen {
            position: relative;
            width: 800px;
            height: 600px;
            background: #0a0a2a;
            border: 5px solid #ffcc00;
            border-radius: 10px;
            overflow: hidden;
            display: none;
            box-shadow: 0 0 40px rgba(255, 204, 0, 0.5);
        }

        #menuScreen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to bottom, #0a0a2a, #003300);
        }

        .menu-title {
            font-size: 60px;
            margin-bottom: 40px;
            text-shadow: 0 0 10px #ff0000, 0 0 20px #ff5555;
            letter-spacing: 4px;
        }

        .menu-btn {
            background: linear-gradient(to bottom, #ff5555, #cc0000);
            color: white;
            border: none;
            padding: 16px 50px;
            font-size: 24px;
            margin: 15px 0;
            width: 300px;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 6px 0 #880000;
            font-weight: bold;
        }

        .menu-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 0 #880000;
        }

        .auth-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(5, 5, 25, 0.95);
        }

        input {
            padding: 14px;
            font-size: 22px;
            width: 280px;
            text-align: center;
            background: #111;
            color: white;
            border: 2px solid #ff5555;
            border-radius: 8px;
            margin: 15px 0;
        }

        #leaderboardList {
            width: 90%;
            max-height: 350px;
            overflow-y: auto;
            background: rgba(10, 10, 40, 0.7);
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
        }

        .lb-entry {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #444;
            font-size: 20px;
        }

        #settingsPanel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(5, 5, 30, 0.95);
            color: #ffcc00;
            padding: 30px;
            border-radius: 12px;
            width: 85%;
            max-width: 500px;
            display: none;
            z-index: 10;
            border: 3px solid #ff5555;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            background: #ff5555;
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
        }

        #gameContainer canvas {
            display: block;
        }

        #hud, #bossHealthBar, #fireTimerDisplay, #flagInfo {
            position: absolute;
            color: white;
            font-weight: bold;
            text-shadow: 2px 2px 0 #000;
            z-index: 15;
        }

        #hud { top: 20px; left: 20px; font-size: 22px; }
        #bossHealthBar { top: 20px; right: 20px; background: rgba(0,0,0,0.6); padding: 12px; border-radius: 10px; display: none; }
        #fireTimerDisplay { top: 70px; left: 20px; color: #ff6600; font-size: 20px; display: none; }
        #flagInfo { top: 100px; left: 20px; color: #ffff00; font-size: 20px; }

        #bossHealth {
            height: 16px;
            background: linear-gradient(to right, #ff0000, #ffff00, #00ff00);
            border-radius: 8px;
            margin-top: 8px;
        }

        #modal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.92);
            color: white;
            padding: 50px;
            border-radius: 15px;
            text-align: center;
            z-index: 30;
            display: none;
            border: 4px solid #ffcc00;
        }

        #modal h2 {
            font-size: 56px;
            margin-bottom: 25px;
            color: #ff5555;
        }

        #modal p {
            font-size: 26px;
            margin-bottom: 30px;
            color: #ffcc00;
            line-height: 1.4;
        }

        #restartBtn {
            font-size: 22px;
            padding: 14px 50px;
            margin-top: 20px;
            background: linear-gradient(to bottom, #00ccff, #0066cc);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 6px 0 #004488;
        }

        #restartBtn:hover {
            background: linear-gradient(to bottom, #33ddff, #0088dd);
            transform: translateY(-3px);
            box-shadow: 0 8px 0 #004488;
        }

        button {
            font-size: 22px;
            padding: 14px 50px;
            margin-top: 20px;
            background: linear-gradient(to bottom, #ffcc00, #ff9900);
            color: #000;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 6px 0 #cc7a00;
        }

        button:hover {
            background: linear-gradient(to bottom, #ffdd55, #ffa500);
            transform: translateY(-3px);
            box-shadow: 0 8px 0 #cc7a00;
        }

        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #aaa;
            font-size: 16px;
        }

        #credit {
            position: absolute;
            bottom: 15px;
            color: #888;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="menuScreen" class="screen">
        <h1 class="menu-title">SUPER MARIO QUEST</h1>
        <button class="menu-btn" onclick="showLogin()">▶️ START GAME</button>
        <button class="menu-btn" onclick="showLeaderboard()">🏆 LEADERBOARD</button>
        <button class="menu-btn" onclick="showSettings()">⚙️ SETTINGS</button>
        <div id="credit">Made for smart players who fire with K!</div>
    </div>

    <div id="loginScreen" class="screen auth-screen">
        <h2 style="font-size:42px; margin-bottom:30px; color:#ff5555;">ENTER YOUR NAME</h2>
        <input type="text" id="playerName" value="" maxlength="12" placeholder="Your Hero Name">
        <button class="menu-btn" onclick="startGame()">⚔️ BEGIN QUEST</button>
        <button class="menu-btn" style="background:#555;" onclick="showMenu()">⬅️ MAIN MENU</button>
    </div>

    <div id="leaderboardScreen" class="screen auth-screen">
        <h2 style="font-size:38px; margin-bottom:30px; color:gold;">HALL OF LEGENDS</h2>
        <div id="leaderboardList"></div>
        <button class="menu-btn" onclick="showMenu()">⬅️ MAIN MENU</button>
    </div>

    <div id="settingsPanel">
        <button class="close-btn" onclick="hideSettings()">✕</button>
        <h3 style="font-size:28px; margin-bottom:25px; color:#ffcc00;">🎮 SETTINGS</h3>
        <div style="display:flex; justify-content:space-between; margin:18px 0; font-size:20px;">
            <span>Fire Key:</span>
            <input type="text" id="fireKeyInput" value="K" maxlength="1" style="padding:10px; width:60px; text-align:center; background:#111; color:white; border:2px solid #ff5555; border-radius:6px; font-size:18px;">
        </div>
        <button class="menu-btn" onclick="saveSettings()" style="margin-top:25px;">💾 SAVE & APPLY</button>
    </div>

    <div id="gameContainer" class="screen">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="hud">
            <div>Level: <span id="level">1</span></div>
            <div>Score: <span id="score">0</span></div>
            <div>Coins: <span id="coins">0</span></div>
            <div>Lives: <span id="lives">3</span></div>
        </div>
        <div id="flagInfo">📍 Flag at X:2100 | Your Position: <span id="playerX">100</span></div>
        <div id="fireTimerDisplay">🔥 Fire Power: <span id="fireTime">15</span>s</div>
        <div id="bossHealthBar">
            BOWSER<br>
            <div id="bossHealth" style="width:200px;"></div>
        </div>
        <div id="modal">
            <h2 id="modalTitle">Level Complete!</h2>
            <p id="modalText">Score: 0</p>
            <button id="modalBtn" onclick="handleModalAction()">Next</button>
            <button id="restartBtn" onclick="restartFromModal()" style="display:none;">↻ Restart Level</button>
        </div>
        <div id="controls">WASD / Arrows: Move | W/↑/Space: Jump | K: Fire</div>
    </div>

        if (!localStorage.getItem(LB_KEY)) {

                {name: 'PEACH', score: 6500},
                {name: 'YOSHI', score: 5800},

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
            document.getElementById(id).style.display = 'flex';
        }

        function showMenu() { 
            showScreen('menuScreen');
        }

        function showLogin() { 
            showScreen('loginScreen');
            document.getElementById('playerName').value = '';
        }

        function showSettings() {
            document.getElementById('fireKeyInput').value = fireKey;
            document.getElementById('settingsPanel').style.display = 'block';
        }

        function hideSettings() { 
            document.getElementById('settingsPanel').style.display = 'none';
        }

        function saveSettings() {
            const key = document.getElementById('fireKeyInput').value.toUpperCase();
            if (key && key.length === 1) {
                fireKey = key;
                hideSettings();
                alert(`✅ Fire key set to: ${key}`);
            } else {
                alert("❌ Please enter a single key (e.g., K)");
            }
        }

        function updateLeaderboard() {
            const lb = document.getElementById('leaderboardList');
            const scores = JSON.parse(localStorage.getItem(LB_KEY));
            lb.innerHTML = scores.map((s, i) => 
                `<div class="lb-entry">
                    <span>${i+1}. ${s.name || 'Anonymous'}</span>
                    <span style="color:gold;">${s.score.toLocaleString()}</span>
                </div>`
            ).join('');
        }

        function showLeaderboard() {
            updateLeaderboard();
            showScreen('leaderboardScreen');
        }

            currentPlayer = document.getElementById('playerName').value.trim() || "Player";

            showScreen('gameContainer');

            } else {

        document.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (e.code === 'KeyA') keys['ArrowLeft'] = true;
            if (e.code === 'KeyD') keys['ArrowRight'] = true;
            
            if ((e.code === 'Space' || e.code === 'KeyW' || e.code === 'ArrowUp') && player.grounded) {
                player.velY = JUMP_FORCE;
                player.grounded = false;
                screenShake(3, 8);
            }
            
            if (e.key.toUpperCase() === fireKey && player.powerUp === 'fire') {
                shootFireball();
            }
            
            if (e.key.toUpperCase() === fireKey && boss.active) {
                boss.health--;
                createParticles(boss.x, boss.y, 15, { color: '#ff5555', size: 3, life: 30 });
                screenShake(8, 15);
                if (boss.health <= 0) {
                    boss.active = false;
                    game.score += 5000;
                    updateHUD();
                    setTimeout(() => completeLevel(), 500);
                }
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.code] = false;
            if (e.code === 'KeyA') keys['ArrowLeft'] = false;
            if (e.code === 'KeyD') keys['ArrowRight'] = false;
        });

        function initGame() {
            resetGame();
            gameLoop();
        }

        function resetGame() {
            game = { score: 0, coins: 0, lives: 3, currentLevel: 1, gameOver: false, cameraX: 0, levelComplete: false };
            player.powerUp = 'small';
            player.invincible = false;
            player.invincibleTimer = 0;
            player.fireTimer = 0;
            player.facing = 1;
            player.lastFireTime = 0;
            loadLevel(1);
            updateHUD();
            document.getElementById('modal').style.display = 'none';
            document.getElementById('bossHealthBar').style.display = 'none';
            document.getElementById('fireTimerDisplay').style.display = 'none';
        }

        function loadLevel(levelNum) {
            const level = levels[levelNum - 1];
            if (!level) {
                showModal('🏆 QUEST COMPLETE!', `You saved the kingdom!\nFinal Score: ${game.score.toLocaleString()}`, 'Main Menu', 'menu');
                return;
            }
            
            platforms = level.platforms.map(p => ({...p}));
            coins = level.coins ? level.coins.map(c => ({...c, collected: false})) : [];
            enemies = level.enemies ? level.enemies.map(e => ({...e, active: true, direction: 1})) : [];
            powerUps = level.powerUps ? level.powerUps.map(p => ({...p, collected: false})) : [];
            fireballs = [];
            bossFireballs = [];
            
            player.x = 100;
            player.y = 400;
            player.velX = 0;
            player.velY = 0;
            game.cameraX = 0;
            game.levelComplete = false;
            
            boss = {
                active: level.isBossLevel,
                x: 1800,
                y: 550 - 64,
                width: 64,
                height: 64,
                health: 5,
                maxHealth: 5,
                fireCooldown: 0
            };
            
            document.getElementById('bossHealthBar').style.display = level.isBossLevel ? 'block' : 'none';
        }

        function screenShake(intensity = 5, duration = 10) {
            shake.time = duration;
            shake.intensity = intensity;
        }

        function createParticles(x, y, count, options = {}) {
            const { color = '#ffffff', size = 2, life = 20 } = options;
            for (let i = 0; i < count; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 6,
                    vy: (Math.random() - 0.5) * 6,
                    radius: size + Math.random() * size,
                    life,
                    color
                });
            }
        }

        function updateShake() {
            if (shake.time > 0) {
                shake.x = (Math.random() - 0.5) * shake.intensity;
                shake.y = (Math.random() - 0.5) * shake.intensity;
                shake.time--;
            } else {
                shake.x = 0;
                shake.y = 0;
            }
        }

        function updateParticles() {
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.1;
                p.life--;
                p.radius *= 0.98;
                return p.life > 0 && p.x > -100 && p.x < 900 && p.y > -100 && p.y < 700;
            });
        }

        function drawParticles() {
            particles.forEach(p => {
                const alpha = p.life / p.life;
                ctx.globalAlpha = 0.8;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x - game.cameraX + shake.x, p.y + shake.y, p.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            });
        }

        function updatePlayer() {
            player.velX = 0;
            if (keys['ArrowLeft'] || keys['KeyA']) {
                player.velX = -MOVE_SPEED;
                player.facing = -1;
            } else if (keys['ArrowRight'] || keys['KeyD']) {
                player.velX = MOVE_SPEED;
                player.facing = 1;
            }
            
            player.velY += GRAVITY;
            player.x += player.velX;
            player.y += player.velY;
            
            player.grounded = false;
            const h = player.powerUp === 'big' || player.powerUp === 'fire' ? 48 : 32;
            
            platforms.forEach(p => {
                if (player.x + 32 > p.x && player.x < p.x + p.w &&
                    player.y + h > p.y && player.y + h < p.y + 20 && player.velY >= 0) {
                    player.y = p.y - h;
                    player.velY = 0;
                    player.grounded = true;
                }
            });
            
            if (player.y > 650) loseLife();
            
            game.cameraX = Math.max(0, player.x - 350);
            document.getElementById('playerX').textContent = Math.floor(player.x);
        }

        function updateEnemies() {
            enemies.forEach(e => {
                if (!e.active) return;

                e.x += (e.type === 'GOOMBA' ? 1.5 : 1) * e.direction;

                let platform = null;
                platforms.forEach(p => {
                    if (e.x + 32 > p.x && e.x < p.x + p.w &&
                        e.y + 32 >= p.y - 5 && e.y + 32 <= p.y + 5) {
                        platform = p;
                    }
                });

                if (platform) {
                    e.y = platform.y - 32;
                    if (e.x <= platform.x || e.x + 32 >= platform.x + platform.w) {
                        e.direction *= -1;
                    }
                } else {
                    e.y += GRAVITY;
                    if (e.y > 600) e.active = false;
                }

                const h = player.powerUp === 'big' || player.powerUp === 'fire' ? 48 : 32;
                if (player.x + 32 > e.x && player.x < e.x + 32 &&
                    player.y + h > e.y && player.y < e.y + 32) {
                    if (player.velY > 0 && player.y + h < e.y + 20) {
                        e.active = false;
                        player.velY = -8;
                        game.score += 200;
                        updateHUD();
                        screenShake(4, 10);
                        createParticles(e.x + 16, e.y + 32, 8, { color: '#aaaaaa', size: 2, life: 20 });
                    } else {
                        hitPlayer();
                    }
                }
            });
        }

        function updateBoss() {
            if (!boss.active) return;
            
            if (boss.fireCooldown > 0) {
                boss.fireCooldown--;
            } else {
                bossFireballs.push({
                    x: boss.x,
                    y: boss.y + 32,
                    vx: -4,
                    vy: 0,
                    radius: 10
                });
                boss.fireCooldown = 120;
                screenShake(5, 10);
            }
            
            const w = (boss.health / boss.maxHealth) * 200;
            document.getElementById('bossHealth').style.width = `${Math.max(0, w)}px`;
        }

        function updateFireballs() {
            fireballs = fireballs.filter(f => {
                f.x += f.vx;
                f.y += f.vy + 0.3;

                for (let i = 0; i < enemies.length; i++) {
                    const e = enemies[i];
                    if (e.active && 
                        f.x > e.x && 
                        f.x < e.x + 32 && 
                        f.y > e.y && 
                        f.y < e.y + 32) {
                        e.active = false;
                        game.score += 200;
                        updateHUD();
                        screenShake(4, 10);
                        createParticles(e.x + 16, e.y + 16, 10, { 
                            color: '#ff5555', 
                            size: 3, 
                            life: 30 
                        });
                        return false;
                    }
                }

                return f.y < 600 && f.x > -100 && f.x < 2200;
            });
            
            bossFireballs = bossFireballs.filter(f => {
                f.x += f.vx;
                f.y += f.vy + 0.3;
                
                const h = player.powerUp === 'big' || player.powerUp === 'fire' ? 48 : 32;
                if (!player.invincible &&
                    player.x + 32 > f.x - f.radius &&
                    player.x < f.x + f.radius &&
                    player.y + h > f.y - f.radius &&
                    player.y < f.y + f.radius) {
                    hitPlayer();
                    return false;
                }
                return f.y < 600 && f.x > -100;
            });
        }

        function updatePowerUps() {
            powerUps.forEach(p => {
                if (!p.collected) {
                    const dx = player.x + 16 - p.x;
                    const dy = player.y + (player.powerUp === 'big' ? 24 : 16) - p.y;
                    if (Math.sqrt(dx*dx + dy*dy) < 25) {
                        p.collected = true;
                        if (p.type === 'mushroom') {
                            if (player.powerUp === 'small') {
                                player.powerUp = 'big';
                                player.y -= 16;
                            }
                            game.score += 500;
                        } else if (p.type === 'fireFlower') {
                            const wasSmall = player.powerUp === 'small';
                            player.powerUp = 'fire';
                            player.fireTimer = player.fireMaxTime;
                            if (wasSmall) player.y -= 16;
                            game.score += 1000;
                            document.getElementById('fireTimerDisplay').style.display = 'block';
                        }
                        updateHUD();
                        createParticles(p.x, p.y, 20, { 
                            color: p.type === 'fireFlower' ? '#00ff00' : '#ff0000', 
                            size: 3, 
                            life: 40 
                        });
                    }
                }
            });
        }

        function updateCoins() {
            coins.forEach(c => {
                if (!c.collected) {
                    const dx = player.x + 16 - c.x;
                    const dy = player.y + (player.powerUp === 'big' ? 24 : 16) - c.y;
                    if (Math.sqrt(dx*dx + dy*dy) < 20) {
                        c.collected = true;
                        game.coins++;
                        game.score += 100;
                        updateHUD();
                        createParticles(c.x, c.y, 10, { color: '#ffd700', size: 2, life: 30 });
                    }
                }
            });
        }

        function hitPlayer() {
            if (player.powerUp === 'fire') {
                player.powerUp = 'big';
                player.invincible = true;
                player.invincibleTimer = 120;
                player.fireTimer = 0;
                document.getElementById('fireTimerDisplay').style.display = 'none';
            } else if (player.powerUp === 'big') {
                player.powerUp = 'small';
                player.y += 16;
                player.invincible = true;
                player.invincibleTimer = 120;
            } else {
                loseLife();
            }
            screenShake(8, 15);
        }

        function loseLife() {
            game.lives--;
            updateHUD();
            
            if (game.lives <= 0) {
                saveScore();
                showMenu();
                const finalScore = game.score;
                showModal(
                    'Game Over!', 
                    `Final Score: ${finalScore.toLocaleString()}`, 
                    'Main Menu', 
                    'menu',
                    true // showRestart = true
                );
            } else {
                player.invincible = true;
                player.invincibleTimer = 120;
                loadLevel(game.currentLevel);
            }
        }

        function checkFlag() {
            const flag = levels[game.currentLevel - 1].flag;
            if (!flag || boss.active) return;
            
            if (player.x + 32 > flag.x && player.x < flag.x + 8) {
                completeLevel();
            }
        }

        function completeLevel() {
            game.score += 1000;
            game.currentLevel++;
            updateHUD();
            
            if (game.currentLevel > levels.length) {
                showModal(
                    '🏆 QUEST COMPLETE!', 
                    `You saved the kingdom!\nFinal Score: ${game.score.toLocaleString()}`, 
                    'Main Menu', 
                    'menu'
                );
            } else {
                showModal(
                    '🌟 Level Complete!', 
                    `Score: ${game.score}`, 
                    'Next Level', 
                    'next'
                );
            }
        }

        function nextLevel() {
            loadLevel(game.currentLevel);
        }

        function updateHUD() {
            document.getElementById('level').textContent = game.currentLevel;
            document.getElementById('score').textContent = game.score;
            document.getElementById('coins').textContent = game.coins;
            document.getElementById('lives').textContent = game.lives;
        }

        function updateFireTimer() {
            if (player.powerUp === 'fire') {
                player.fireTimer--;
                const secondsLeft = Math.ceil(player.fireTimer / 60);
                document.getElementById('fireTime').textContent = secondsLeft;
                document.getElementById('fireTimerDisplay').style.display = 'block';
                
                if (player.fireTimer <= 0) {
                    player.powerUp = 'big';
                    document.getElementById('fireTimerDisplay').style.display = 'none';
                }
            } else {
                document.getElementById('fireTimerDisplay').style.display = 'none';
            }
        }

        function showModal(title, text, btnText, action, showRestart = false) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalText').textContent = text;
            document.getElementById('modalBtn').textContent = btnText;
            document.getElementById('modalBtn').style.display = 'inline-block';
            window.modalAction = action;
            
            const restartBtn = document.getElementById('restartBtn');
            if (showRestart) {
                restartBtn.style.display = 'inline-block';
            } else {
                restartBtn.style.display = 'none';
            }
            
            document.getElementById('modal').style.display = 'block';
        }

        function handleModalAction() {
            document.getElementById('modal').style.display = 'none';
            if (window.modalAction === 'menu') {
                showMenu();
            } else if (window.modalAction === 'next') {
                nextLevel();
            }
        }

        function restartFromModal() {
            document.getElementById('modal').style.display = 'none';
            resetGame();
            gameLoop();
        }

        function saveScore() {
            const scores = JSON.parse(localStorage.getItem(LB_KEY));
            const nameToSave = currentPlayer || "Anonymous";
            scores.push({name: nameToSave, score: game.score});
            scores.sort((a, b) => b.score - a.score);
            localStorage.setItem(LB_KEY, JSON.stringify(scores.slice(0, 10)));
        }

        function drawBackground() {
            ctx.fillStyle = '#5c94fc';
            ctx.fillRect(0, 0, 800, 400);
            ctx.fillStyle = '#003300';
            ctx.fillRect(0, 400, 800, 200);
        }

        function drawPlayer() {
            const h = player.powerUp === 'big' || player.powerUp === 'fire' ? 48 : 32;
            ctx.fillStyle = player.powerUp === 'fire' ? '#ffffff' : '#ff0000';
            ctx.fillRect(player.x - game.cameraX + shake.x, player.y + shake.y, 32, 12);
            ctx.fillStyle = player.powerUp === 'fire' ? '#ffffff' : '#0000ff';
            ctx.fillRect(player.x - game.cameraX + shake.x + 6, player.y + shake.y + 12, 20, h - 12);
            ctx.fillStyle = '#ffcc99';
            ctx.fillRect(player.x - game.cameraX + shake.x + 8, player.y + shake.y + 24, 16, 10);
        }

        function drawBoss() {
            if (!boss.active) return;
            ctx.fillStyle = '#8B0000';
            ctx.fillRect(boss.x - game.cameraX + shake.x, boss.y + shake.y, 64, 64);
        }

        function drawPlatforms() {
            platforms.forEach(p => {
                ctx.fillStyle = '#8B4513';
                ctx.fillRect(p.x - game.cameraX + shake.x, p.y + shake.y, p.w, p.h);
            });
        }

        function drawCoins() {
            coins.forEach(c => {
                if (!c.collected) {
                    ctx.fillStyle = '#FFD700';
                    ctx.beginPath();
                    ctx.arc(c.x - game.cameraX + shake.x, c.y + shake.y, 10, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#FFA500';
                    ctx.beginPath();
                    ctx.arc(c.x - game.cameraX + shake.x, c.y + shake.y, 6, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
        }

        function drawPowerUps() {
            powerUps.forEach(p => {
                if (!p.collected) {
                    if (p.type === 'mushroom') {
                        ctx.fillStyle = '#ff0000';
                        ctx.beginPath();
                        ctx.arc(p.x - game.cameraX + shake.x, p.y + shake.y - 8, 12, Math.PI, 0);
                        ctx.fill();
                        ctx.fillStyle = '#fff';
                        ctx.beginPath();
                        ctx.arc(p.x - game.cameraX + shake.x - 6, p.y + shake.y - 10, 4, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(p.x - game.cameraX + shake.x + 6, p.y + shake.y - 10, 4, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = '#ffcc99';
                        ctx.fillRect(p.x - game.cameraX + shake.x - 6, p.y + shake.y - 4, 12, 8);
                    } else if (p.type === 'fireFlower') {
                        ctx.fillStyle = '#00ff00';
                        ctx.fillRect(p.x - game.cameraX + shake.x - 3, p.y + shake.y - 8, 6, 16);
                        ctx.fillStyle = '#ff6600';
                        ctx.beginPath();
                        ctx.arc(p.x - game.cameraX + shake.x, p.y + shake.y - 12, 8, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = '#ffff00';
                        ctx.beginPath();
                        ctx.arc(p.x - game.cameraX + shake.x, p.y + shake.y - 12, 4, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            });
        }

        function drawEnemies() {
            enemies.forEach(e => {
                if (e.active) {
                    ctx.fillStyle = e.type === 'GOOMBA' ? '#8B0000' : '#008000';
                    ctx.fillRect(e.x - game.cameraX + shake.x, e.y + shake.y, 32, 32);
                }
            });
        }

        function drawFireballs() {
            fireballs.forEach(f => {
                ctx.fillStyle = '#ff6600';
                ctx.beginPath();
                ctx.arc(f.x - game.cameraX + shake.x, f.y + shake.y, f.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#ffff00';
                ctx.beginPath();
                ctx.arc(f.x - game.cameraX + shake.x, f.y + shake.y, f.radius/2, 0, Math.PI * 2);
                ctx.fill();
            });
            
            bossFireballs.forEach(f => {
                ctx.fillStyle = '#ff0000';
                ctx.beginPath();
                ctx.arc(f.x - game.cameraX + shake.x, f.y + shake.y, f.radius, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function drawFlag() {
            const flag = levels[game.currentLevel - 1].flag;
            if (!flag) return;
            
            ctx.fillStyle = '#228B22';
            ctx.fillRect(flag.x - game.cameraX + shake.x, flag.y - 100 + shake.y, 10, 100);
            ctx.fillStyle = '#ff0000';
            ctx.beginPath();
            ctx.moveTo(flag.x - game.cameraX + shake.x + 10, flag.y - 100 + shake.y);
            ctx.lineTo(flag.x - game.cameraX + shake.x + 50, flag.y - 85 + shake.y);
            ctx.lineTo(flag.x - game.cameraX + shake.x + 10, flag.y - 70 + shake.y);
            ctx.closePath();
            ctx.fill();
            
            ctx.font = 'bold 16px Courier New';
            ctx.fillStyle = '#ffff00';
            ctx.textAlign = 'center';
            ctx.fillText('FLAG!', flag.x - game.cameraX + shake.x + 30, flag.y - 120 + shake.y);
            ctx.textAlign = 'left';
        }

        function gameLoop() {
            if (game.levelComplete) return;
            
            updatePlayer();
            updateEnemies();
            updateCoins();
            updatePowerUps();
            updateFireballs();
            updateParticles();
            updateShake();
            updateFireTimer();
            if (boss.active) updateBoss();
            checkFlag();
            
            drawBackground();
            drawPlatforms();
            drawCoins();
            drawPowerUps();
            drawEnemies();
            drawFireballs();
            if (boss.active) drawBoss();
            drawFlag();
            drawPlayer();
            drawParticles();
            
            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
